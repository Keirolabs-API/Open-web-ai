server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # the demo lives at /example/
    location = / { return 301 /example/; }

    location / { try_files $uri $uri/ =404; }

    # ES modules need a JavaScript MIME; nginx's default mime.types maps .js,
    # but pin it explicitly so a barebones image can't break module loading.
    location ~ \.js$ {
        default_type application/javascript;
        try_files $uri =404;
    }
}